packages:
  deye-inverter: !include Deye-SG0xLP1.factory.base.yaml

ota:
  - platform: http_request
    id: ota_http_request
  - id: !extend ota_esphome
    password: !remove

update:
  - platform: http_request
    id: update_http_request
    name: Firmware Update
    source: https://janso123.github.io/esphome-deye-inverter/firmware/Waveshare-ESP32-S3-POE-ETH-8DI-8RO-C/Deye-SG0xLP1/manifest.json

http_request:

wifi: !remove
captive_portal: !remove

ethernet:
  type: W5500
  clk_pin: ${ethernet_clk_pin}
  mosi_pin: ${ethernet_mosi_pin}
  miso_pin: ${ethernet_miso_pin}
  cs_pin: ${ethernet_cs_pin}
  interrupt_pin: ${ethernet_interrupt_pin}
  reset_pin: ${ethernet_reset_pin}

api:
  encryption: !remove

dashboard_import:
  import_full_config: false
  package_import_url: github://Janso123/esphome-deye-inverter/devices/Waveshare-ESP32-S3-POE-ETH-8DI-8RO-C/Deye-SG0xLP1.yaml@main
