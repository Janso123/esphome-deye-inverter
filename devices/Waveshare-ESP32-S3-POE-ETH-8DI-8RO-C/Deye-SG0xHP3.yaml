# Fork-specific templates in this directory (see README section About this fork).
# Upstream: https://github.com/Lewa-Reka/esphome-deye-inverter (Apache-2.0).

# Waveshare ESP32-S3-POE-ETH-8DI-8RO-C: 8 isolated digital inputs and 8 relay outputs.
# W5500 Ethernet and RS485 GPIOs match ESP32-S3-POE-ETH-8DI-8DO.

substitutions:
  api_key: ""
  ota_password: " "
  fallback_password: ""
  wifi_ssid: ""
  wifi_password: ""
  network_mode: "ethernet" # Change to "wifi" and fill Wi-Fi credentials to use wireless networking.

  ethernet_clk_pin: GPIO15
  ethernet_mosi_pin: GPIO13
  ethernet_miso_pin: GPIO14
  ethernet_cs_pin: GPIO16
  ethernet_interrupt_pin: GPIO12
  ethernet_reset_pin: GPIO39
  ethernet_manual_ip_enabled: false
  ethernet_use_address_enabled: false
  # ethernet_static_ip: 192.168.1.50
  # ethernet_gateway: 192.168.1.1
  # ethernet_subnet: 255.255.255.0
  # ethernet_dns1: 1.1.1.1
  # ethernet_dns2: 8.8.8.8
  # ethernet_use_address: 192.168.1.50

  modbus_inverter_address: "0x01" # Default Modbus address, should be changed to match inverter settings

  # Safe Mode parameters for supported inverters
  safe_mode_delay: 600s # Time after which transition to safe mode and setting default operating parameters will occur
  default_maximum_battery_charge_current: "30" # Amps
  default_max_sell_power: "12000" # Watts. Adjust to your inverter
  default_system_work_mode: "Zero Export To Load" # "Selling First", "Zero Export To Load", "Zero Export To CT"
  default_solar_sell: "on" # "on", "off"
  default_force_off_grid: "off" # "on", "off"

  enable_sync_time: false # true, false - Enable time sync with HomeAssistant (Deye 3P inverters only)

packages:
  pv_inverter:
    url: https://github.com/Janso123/esphome-deye-inverter
    ref: main
    files: pv_inverter/deye_hybrid_3p_hv.yaml

esphome:
  min_version: "2025.12.0"
  name_add_mac_suffix: true

uart:
  tx_pin: GPIO17
  rx_pin: GPIO18

modbus:
  flow_control_pin: GPIO21

logger:
  level: WARN # VERBOSE / DEBUG / INFO / WARN

esp32:
  variant: esp32s3
  framework:
    type: esp-idf
