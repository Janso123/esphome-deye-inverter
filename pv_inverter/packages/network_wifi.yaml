wifi:
  ssid: ${wifi_ssid}
  password: ${wifi_password}

  ap:
    ssid: "${friendly_name} Fallback Hotspot"
    password: ${fallback_password}

captive_portal:

sensor:
  - platform: wifi_signal
    name: "ESP WiFi Signal"
    id: esp_wifi_signal
    icon: mdi:wifi
    update_interval: 60s
    entity_category: diagnostic

text_sensor:
  - platform: wifi_info
    ip_address:
      name: ESP IP Address
      id: esp_ip_address
      icon: mdi:ip-network
      entity_category: diagnostic
    ssid:
      name: ESP WiFi SSID
      id: esp_wifi_ssid
      icon: mdi:access-point
      entity_category: diagnostic
    mac_address:
      name: ESP Mac Address
      id: esp_mac_address
      icon: mdi:expansion-card
      entity_category: diagnostic
